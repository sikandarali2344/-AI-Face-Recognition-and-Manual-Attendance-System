<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Records - Face Recognition System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .nav button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        
        .attendance-container {
            background: white;
            color: black;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .search-box {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 300px;
        }
        
        .export-btn {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        th:hover {
            background: #45a049;
        }
        
        .status-present {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .status-absent {
            color: #f44336;
            font-weight: bold;
        }
        
        .date-filter {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            .search-box, .date-filter, .export-btn {
                width: 100%;
            }
            table {
                font-size: 14px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Attendance Records</h1>
            <p>View and manage attendance history</p>
        </header>
        
        <div class="nav">
            <button class="btn-secondary" onclick="location.href='/">🏠 Home</button>
            <button class="btn-primary" onclick="location.href='/register'">📝 Register Student</button>
        </div>
        
        <div class="attendance-container">
            <div class="controls">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by name or ID...">
                <input type="date" id="dateFilter" class="date-filter">
                <button class="export-btn" onclick="exportToCSV()">📥 Export to CSV</button>
            </div>
            
            <div id="attendanceTable">
                <p>Loading attendance data...</p>
            </div>
            
            <div id="summary" class="summary"></div>
        </div>
    </div>
    
    <script>
        let attendanceData = [];
        
        function loadAttendanceData() {
            fetch('/get_attendance_data')
                .then(response => response.json())
                .then(data => {
                    attendanceData = data;
                    filterAndDisplay();
                });
        }
        
        function filterAndDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const dateFilter = document.getElementById('dateFilter').value;
            
            let filteredData = attendanceData;
            
            // Apply search filter
            if (searchTerm) {
                filteredData = filteredData.filter(student => 
                    student.name.toLowerCase().includes(searchTerm) || 
                    student.student_id.toLowerCase().includes(searchTerm)
                );
            }
            
            // Calculate summary
            const total = filteredData.length;
            const present = filteredData.filter(s => s.time !== 'Absent').length;
            const absent = total - present;
            const percentage = total > 0 ? ((present / total) * 100).toFixed(2) : 0;
            
            // Display table
            let html = '<table>';
            html += '<thead><tr>';
            html += '<th onclick="sortBy(\'student_id\')">Student ID ⬍</th>';
            html += '<th onclick="sortBy(\'name\')">Name ⬍</th>';
            html += '<th onclick="sortBy(\'time\')">Time ⬍</th>';
            html += '<th>Status</th>';
            html += '</tr></thead><tbody>';
            
            filteredData.forEach(student => {
                let status = student.time === 'Absent' ? 'Absent' : 'Present';
                let statusClass = status === 'Present' ? 'status-present' : 'status-absent';
                html += `<tr>
                            <td>${student.student_id}</td>
                            <td>${student.name}</td>
                            <td>${student.time}</td>
                            <td class="${statusClass}">${status}</td>
                        </tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('attendanceTable').innerHTML = html;
            
            // Display summary
            document.getElementById('summary').innerHTML = `
                <strong>📈 Summary:</strong><br>
                Total Students: ${total}<br>
                Present: ${present} ✅<br>
                Absent: ${absent} ❌<br>
                Attendance Percentage: ${percentage}%
            `;
        }
        
        let sortColumn = '';
        let sortDirection = 'asc';
        
        function sortBy(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            
            attendanceData.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                
                if (column === 'time') {
                    if (valA === 'Absent') valA = '9999';
                    if (valB === 'Absent') valB = '9999';
                }
                
                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            filterAndDisplay();
        }
        
        function exportToCSV() {
            let csv = "Student ID,Name,Time,Status\n";
            attendanceData.forEach(student => {
                const status = student.time === 'Absent' ? 'Absent' : 'Present';
                csv += `${student.student_id},${student.name},${student.time},${status}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('keyup', filterAndDisplay);
        document.getElementById('dateFilter').addEventListener('change', filterAndDisplay);
        
        // Load data on page load
        loadAttendanceData();
        setInterval(loadAttendanceData, 5000);
    </script>
</body>
</html>
