<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .nav button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .nav button:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .video-container {
            background: black;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px auto;
            max-width: 800px;
        }
        
        video, img {
            width: 100%;
            height: auto;
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        .controls button {
            margin: 0 10px;
            padding: 12px 25px;
            font-size: 16px;
        }
        
        .attendance-table {
            background: white;
            color: black;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #4CAF50;
            color: white;
        }
        
        .status-present {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .status-absent {
            color: #f44336;
            font-weight: bold;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .recording {
            animation: pulse 1s infinite;
            background: #f44336 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Face Recognition Attendance System</h1>
            <p>Automatic attendance marking using AI</p>
        </header>
        
        <div class="nav">
            <button class="btn-primary" onclick="location.href='/'">🏠 Home</button>
            <button class="btn-secondary" onclick="location.href='/register'">📝 Register Student</button>
            <button class="btn-primary" onclick="location.href='/attendance'">📊 View Attendance</button>
        </div>
        
        <div class="video-container">
            <img id="videoFeed" src="{{ url_for('video_feed') }}" alt="Camera Feed">
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn-primary" onclick="startAttendance()">▶ Start Attendance</button>
            <button id="stopBtn" class="btn-danger" onclick="stopAttendance()" disabled>⏹ Stop Attendance</button>
        </div>
        
        <div class="attendance-table">
            <h2 style="margin-bottom: 20px;">Today's Attendance</h2>
            <div id="attendanceList">
                <p>Loading attendance data...</p>
            </div>
        </div>
    </div>
    
    <script>
        function loadAttendance() {
            fetch('/get_attendance_data')
                .then(response => response.json())
                .then(data => {
                    let html = '<table>';
                    html += '<thead><tr><th>Student ID</th><th>Name</th><th>Time</th><th>Status</th></tr></thead><tbody>';
                    data.forEach(student => {
                        let status = student.time === 'Absent' ? 'Absent' : 'Present';
                        let statusClass = status === 'Present' ? 'status-present' : 'status-absent';
                        html += `<tr>
                                    <td>${student.student_id}</td>
                                    <td>${student.name}</td>
                                    <td>${student.time}</td>
                                    <td class="${statusClass}">${status}</td>
                                </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('attendanceList').innerHTML = html;
                });
        }
        
        function startAttendance() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('startBtn').classList.add('recording');
            fetch('/start_attendance');
            // Refresh attendance every 2 seconds
            window.attendanceInterval = setInterval(loadAttendance, 2000);
        }
        
        function stopAttendance() {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('startBtn').classList.remove('recording');
            fetch('/stop_attendance');
            if (window.attendanceInterval) {
                clearInterval(window.attendanceInterval);
            }
            loadAttendance();
        }
        
        // Load attendance on page load
        loadAttendance();
        // Auto refresh every 5 seconds
        setInterval(loadAttendance, 5000);
    </script>
</body>
</html>
