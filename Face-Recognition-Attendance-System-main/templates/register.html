<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student - Face Recognition System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .nav button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        
        .form-container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .video-preview {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
        }
        
        video {
            width: 100%;
            height: auto;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button[type="submit"]:hover {
            background: #45a049;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Register New Student</h1>
            <p>Capture face and register student information</p>
        </header>
        
        <div class="nav">
            <button class="btn-secondary" onclick="location.href='/">🏠 Home</button>
            <button class="btn-primary" onclick="location.href='/attendance'">📊 View Attendance</button>
        </div>
        
        <div class="form-container">
            <form id="registerForm">
                <div class="form-group">
                    <label for="student_id">Student ID:</label>
                    <input type="text" id="student_id" name="student_id" required placeholder="e.g., S001">
                </div>
                
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required placeholder="e.g., John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="john@university.com">
                </div>
                
                <div class="video-preview">
                    <video id="video" autoplay></video>
                </div>
                
                <button type="button" onclick="captureAndRegister()">📸 Capture & Register</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script>
        let video = document.getElementById('video');
        
        // Start camera
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Camera error:", err);
                showMessage('Camera access denied!', 'error');
            });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        function captureAndRegister() {
            const student_id = document.getElementById('student_id').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            if (!student_id || !name || !email) {
                showMessage('Please fill all fields!', 'error');
                return;
            }
            
            // Capture frame from video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('student_id', student_id);
                formData.append('name', name);
                formData.append('email', email);
                formData.append('photo', blob, 'photo.jpg');
                
                fetch('/register_student', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showMessage(data.message, 'success');
                        setTimeout(() => {
                            location.href = '/';
                        }, 2000);
                    } else {
                        showMessage(data.message, 'error');
                    }
                })
                .catch(err => {
                    showMessage('Registration failed!', 'error');
                });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
